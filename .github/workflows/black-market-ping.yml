name: Black Market Ping

on:
  schedule:
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord ping
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ROLE_MENTION: ${{ vars.ROLE_MENTION }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"${ROLE_MENTION} 🕶️ **Black Market is here!** Go check it out before it's gone.\"}" \
               "$WEBHOOK_URL"
